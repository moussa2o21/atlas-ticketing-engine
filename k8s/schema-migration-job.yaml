apiVersion: batch/v1
kind: Job
metadata:
  name: desk-schema-migration
  namespace: atlas-desk
  labels:
    app: desk-migration
    component: migration
spec:
  completions: 1
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: desk-migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: atlasidentitycr.azurecr.io/applogica-desk-api:v1.0.0
          imagePullPolicy: Always
          args: ["--migrate"]
          envFrom:
            - secretRef:
                name: atlas-desk-db-secret
            - secretRef:
                name: atlas-desk-eventbus-secret
            - secretRef:
                name: atlas-desk-redis-secret
            - secretRef:
                name: atlas-desk-ai-secret
          env:
            - name: Auth__Authority
              value: "http://keycloak.atlas-identity.svc.cluster.local:8080/realms/applogica"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
