apiVersion: apps/v1
kind: Deployment
metadata:
  name: desk-signalr
  namespace: atlas-desk
  labels:
    app: desk-signalr
    component: signalr
spec:
  replicas: 2
  selector:
    matchLabels:
      app: desk-signalr
  template:
    metadata:
      labels:
        app: desk-signalr
        component: signalr
    spec:
      containers:
        - name: desk-signalr
          image: atlasidentitycr.azurecr.io/applogica-desk-api:v1.0.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: atlas-desk-db-secret
            - secretRef:
                name: atlas-desk-eventbus-secret
            - secretRef:
                name: atlas-desk-redis-secret
            - secretRef:
                name: atlas-desk-ai-secret
          env:
            - name: Auth__Authority
              value: "http://keycloak.atlas-identity.svc.cluster.local:8080/realms/applogica"
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
